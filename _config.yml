title: Hello, world! Mohameth François Sy
description: > # this means to ignore newlines until "baseurl:"
  Write an awesome description for your new site here. You can edit this
  line in _config.yml. It will appear in your document head meta (for
  Google search results) and in your feed.xml site description.
permalink: ':title/'
domain: "mfsy.github.io"
#baseurl: "/" # the subpath of your site, e.g. /blog
url: "https://mfsy.github.io" # the base hostname & protocol for your site, e.g. http://example.com
site-twitter: #if your site has a twitter account, enter it here

# Author Settings
author: Mohameth François Sy # add your name
author-img: mfsy.jpeg # add your photo
#about-author: "". # add description
social-twitter: MfsySy # add your Twitter handle
#social-facebook: # add your Facebook handle
social-github: mfsy # add your Github handle
social-linkedin: mofsy # add your Linkedin handle
#social-email: # add your Email address

# Analytics
analytics: # Google Analytics

# Build Settings
markdown: kramdown
plugins:
  - jekyll-sitemap
  - jekyll-paginate
  - jemoji

paginate: 8
paginate_path: "/page/:num"

exclude: ["node_modules", "gulpfile.js", "package.json", "yarn.lock"]
